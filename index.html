<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanta Labs</title>
  <meta
    name="description"
    content="Vanta Labs is an independent UK software company. New products launching soon."
  />
  <style>
    :root {
      --bg: #000000;
      --text: #f5f5f5;
      --gold: #d4af37;
      --line: rgba(255,255,255,0.10);
      --muted: rgba(255,255,255,0.68);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.65;
      color: var(--muted);
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .footer a {
      color: var(--gold);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (min-width: 700px) {
      .card {
        padding: 56px 48px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">Vanta Labs</div>
      <h1>Coming Soon.</h1>
      <p class="lead">
        We’re an independent UK software company building clean digital products.
        New releases are on the way.
      </p>

      <div class="footer">
        Contact: <a href="mailto:support@vantalabs.co.uk">support@vantalabs.co.uk</a>
      </div>
    </section>
  </main>
</body>
</html>
