<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanta Labs NW Ltd</title>
  <meta name="description" content="Official website of Vanta Labs NW Ltd." />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --line: rgba(255, 255, 255, 0.24);
      --gold: #d4af37;
      --max: 1880px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(100% - 48px, var(--max));
      margin: 0 auto;
    }

    .topbar {
      padding-top: 18px;
    }

    .nav {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      flex-direction: column;
      line-height: 1;
    }

    .brand-main {
      font-size: clamp(28px, 2.15vw, 58px);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ffffff;
      white-space: nowrap;
    }

    .brand-main .gold {
      color: var(--gold);
    }

    .brand-sub {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.44);
    }

    .nav-right {
      display: flex;
      align-items: flex-start;
      gap: clamp(26px, 2.5vw, 52px);
      padding-top: 2px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      color: #ffffff;
      font-size: clamp(18px, 1.15vw, 34px);
      font-weight: 300;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .nav-link:hover,
    .menu-button:hover,
    .menu-links a:hover,
    .text-link:hover {
      color: var(--gold);
      border-color: rgba(212, 175, 55, 0.42);
    }

    .arrow {
      font-size: 0.95em;
      line-height: 1;
    }

    .menu-button {
      background: transparent;
      border: 0;
      color: #ffffff;
      padding: 0 0 12px;
      border-bottom: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font: inherit;
      font-size: clamp(18px, 1.15vw, 34px);
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .menu-lines {
      width: 22px;
      height: 14px;
      position: relative;
      display: inline-block;
      flex: 0 0 auto;
    }

    .menu-lines::before,
    .menu-lines::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
    }

    .menu-lines::before {
      top: 0;
    }

    .menu-lines::after {
      bottom: 0;
    }

    .hero {
      min-height: calc(100vh - 96px);
      display: flex;
      align-items: center;
      padding: 80px 0 90px;
    }

    .hero-inner {
      width: 100%;
    }

    .eyebrow {
      margin: 0 0 70px 56px;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(18px, 1vw, 26px);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .headline {
      margin: 0 0 0 56px;
      max-width: 1600px;
      font-size: clamp(54px, 5.15vw, 104px);
      line-height: 1.12;
      font-weight: 300;
      letter-spacing: -0.05em;
      color: #ffffff;
    }

    .headline .gold {
      color: var(--gold);
    }

    .menu-panel {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.96);
      display: none;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-inner {
      width: min(100% - 48px, var(--max));
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 18px;
      padding-bottom: 32px;
    }

    .menu-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .close-button {
      background: transparent;
      border: 0;
      color: #ffffff;
      font: inherit;
      font-size: clamp(18px, 1.15vw, 34px);
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 12px;
      border-bottom: 1px solid var(--line);
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .close-button:hover {
      color: var(--gold);
      border-color: rgba(212, 175, 55, 0.42);
    }

    .menu-links {
      margin-top: auto;
      margin-bottom: auto;
      display: grid;
      gap: 28px;
      padding: 90px 0;
    }

    .menu-links a {
      font-size: clamp(44px, 4.8vw, 94px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.05em;
      color: #ffffff;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100% - 28px, var(--max));
      }

      .brand-main {
        font-size: 22px;
      }

      .brand-sub {
        font-size: 10px;
      }

      .nav-right {
        gap: 18px;
      }

      .nav-link,
      .menu-button,
      .close-button {
        font-size: 16px;
        padding-bottom: 10px;
      }

      .hero {
        align-items: flex-start;
        min-height: auto;
        padding: 90px 0 70px;
      }

      .eyebrow,
      .headline {
        margin-left: 0;
      }

      .eyebrow {
        margin-bottom: 34px;
        font-size: 14px;
      }

      .headline {
        font-size: 38px;
        line-height: 1.16;
      }

      .menu-links {
        gap: 22px;
      }

      .menu-links a {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap nav">
      <a class="brand" href="#top" aria-label="Vanta Labs home">
        <span class="brand-main">Vanta <span class="gold">Labs</span></span>
        <span class="brand-sub">NW LTD</span>
      </a>

      <div class="nav-right">
        <a class="nav-link" href="mailto:aaron@vantalabs.co.uk">
          <span>Contact</span>
          <span class="arrow">↗</span>
        </a>

        <button class="menu-button" id="openMenu" type="button" aria-label="Open menu">
          <span>Menu</span>
          <span class="menu-lines" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>

  <section class="hero" id="top">
    <div class="wrap hero-inner">
      <div class="eyebrow">About Us</div>

      <h1 class="headline">
        We’re an independent UK software company that builds clean, premium digital products by stripping things back to what matters.
        <span class="gold">That’s why we’re called Vanta Labs.</span>
      </h1>
    </div>
  </section>

  <div class="menu-panel" id="menuPanel" aria-hidden="true">
    <div class="menu-inner">
      <div class="menu-top">
        <a class="brand" href="#top" aria-label="Vanta Labs home">
          <span class="brand-main">Vanta <span class="gold">Labs</span></span>
          <span class="brand-sub">NW LTD</span>
        </a>

        <button class="close-button" id="closeMenu" type="button" aria-label="Close menu">
          Close
        </button>
      </div>

      <nav class="menu-links" aria-label="Site menu">
        <a href="mailto:aaron@vantalabs.co.uk" class="text-link">Contact</a>
        <a href="privacy.html" class="text-link">Privacy</a>
      </nav>
    </div>
  </div>

  <script>
    const openMenu = document.getElementById("openMenu");
    const closeMenu = document.getElementById("closeMenu");
    const menuPanel = document.getElementById("menuPanel");

    openMenu.addEventListener("click", function () {
      menuPanel.classList.add("open");
      menuPanel.setAttribute("aria-hidden", "false");
    });

    closeMenu.addEventListener("click", function () {
      menuPanel.classList.remove("open");
      menuPanel.setAttribute("aria-hidden", "true");
    });

    menuPanel.addEventListener("click", function (event) {
      if (event.target === menuPanel) {
        menuPanel.classList.remove("open");
        menuPanel.setAttribute("aria-hidden", "true");
      }
    });
  </script>
</body>
</html>
