cat > ~/Downloads/vantalabs_site/index.html <<'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanta Labs</title>
  <meta
    name="description"
    content="Vanta Labs is an independent UK software company building clean digital products."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand">VANTA LABS</a>

    <nav class="top-nav" aria-label="Main navigation">
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero home-hero">
      <div class="hero-inner">
        <div class="eyebrow">ABOUT US</div>

        <h1 class="headline">
          We’re an independent UK software company
          that builds clean digital products by stripping things back to what
          matters.
          <span class="gold">That’s what Vanta Labs is built on.</span>
        </h1>
      </div>
    </section>

    <section class="portfolio-preview" aria-label="Featured apps">
      <div class="portfolio-grid">
        <a href="#" class="portfolio-card" aria-label="Cigar Ledger">
          <img src="images/cigar-ledger.png" alt="Cigar Ledger app screenshot" />
        </a>

        <a href="#" class="portfolio-card" aria-label="Herf Station">
          <img src="images/herf-station.png" alt="Herf Station app screenshot" />
        </a>

        <a href="#" class="portfolio-card" aria-label="Vanta Shift">
          <img src="images/vanta-shift.png" alt="Vanta Shift app screenshot" />
        </a>
      </div>
    </section>
  </main>
</body>
</html>
EOF
